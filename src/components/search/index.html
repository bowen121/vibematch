<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: visible;
}
.vm-search-wrap {
  max-width: 960px;
  width: 100%;
  margin: 0 auto;
  padding: 25px 40px 0;
}
.vm-search-form {
  display: flex;
  align-items: center;
  padding: 8px 8px 8px 8px;
  border-radius: 999px;
  background: rgba(24,28,42,0.55);
  border: 1px solid rgba(245,243,238,0.08);
  backdrop-filter: blur(14px);
  box-shadow: inset 0 1px 0 rgba(245,243,238,0.06);
  transition: border-color 300ms, box-shadow 300ms;
}
.vm-search-form:focus-within {
  border-color: rgba(212,165,116,0.5);
  box-shadow: inset 0 1px 0 rgba(245,243,238,0.08),
              0 0 0 4px rgba(212,165,116,0.06),
              0 30px 100px -30px rgba(212,165,116,0.4);
}
.vm-search-form input[type="text"] {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #f5f3ee;
  font-family: 'Instrument Serif', serif;
  font-size: 18px;
  font-style: italic;
  padding: 14px 4px;
  min-width: 0;
}
.vm-search-form input[type="text"]::placeholder { color: #555250; }
.vm-search-form button[type="submit"] {
  appearance: none;
  border: none;
  padding: 0 22px;
  height: 46px;
  border-radius: 999px;
  background: linear-gradient(180deg, #d4a574, #b8895d);
  color: #1a1308;
  font-family: 'Inter Tight', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 0 0 1px rgba(220,180,130,0.4), 0 0 18px rgba(212,165,116,0.5);
  transition: box-shadow 300ms, background 300ms;
}
.vm-search-form button[type="submit"]:hover {
  background: linear-gradient(180deg, #e0b882, #c99a5e);
  box-shadow: 0 0 0 1px rgba(220,180,130,0.6), 0 0 28px rgba(212,165,116,0.75);
}
.vm-img-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 46px;
  height: 46px;
  border-radius: 999px;
  flex-shrink: 0;
  cursor: pointer;
  color: #555250;
  border: 1px solid rgba(245,243,238,0.1);
  background: rgba(245,243,238,0.04);
  transition: color 220ms, border-color 220ms, background 220ms;
  margin-right: 6px;
}
.vm-img-btn:hover {
  color: #d4a574;
  border-color: rgba(212,165,116,0.35);
  background: rgba(212,165,116,0.08);
}
.vm-img-btn.has-image {
  color: #d4a574;
  border-color: rgba(212,165,116,0.5);
  background: rgba(212,165,116,0.12);
  box-shadow: 0 0 12px rgba(212,165,116,0.2);
}
.vm-img-btn input[type="file"] { display: none; }
.chips {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  padding: 30px 0 8px;
}
.chip {
  appearance: none;
  background: rgba(24,28,42,0.4);
  border: 1px solid rgba(245,243,238,0.08);
  color: #c7c4bc;
  padding: 9px 18px;
  border-radius: 999px;
  font-family: 'Inter Tight', sans-serif;
  font-size: 13px;
  font-weight: 300;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: all 220ms ease;
}
.chip:hover {
  border-color: rgba(212,165,116,0.4);
  color: #f5f3ee;
  background: rgba(30,28,20,0.45);
  box-shadow: 0 0 0 1px rgba(212,165,116,0.18), 0 0 30px rgba(212,165,116,0.2);
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="vm-search-wrap">
  <form class="vm-search-form" id="vm-form">
    <label class="vm-img-btn" id="vm-img-btn" title="Search by image">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <input type="file" id="vm-file" accept="image/*">
    </label>
    <input id="vm-input" type="text"
      placeholder="a lonely journey through a neon-lit dystopian city"
      autocomplete="off" spellcheck="false" />
    <button type="submit">Match ↗</button>
  </form>
</div>
<div class="chips">
  <button class="chip" data-query="cozy autumn afternoon">cozy autumn afternoon</button>
  <button class="chip" data-query="90s sci-fi paranoia">90s sci-fi paranoia</button>
  <button class="chip" data-query="sunlit Mediterranean nostalgia">sunlit Mediterranean nostalgia</button>
  <button class="chip" data-query="director Wong Kar-wai">director Wong Kar-wai</button>
</div>
<script>
  function send(msg) {
    window.parent.postMessage(Object.assign({ isStreamlitMessage: true }, msg), '*');
  }

  send({ type: 'streamlit:componentReady', apiVersion: 1 });

  function setHeight() {
    var wrap = document.querySelector('.vm-search-wrap');
    var chips = document.querySelector('.chips');
    var h = (wrap ? wrap.getBoundingClientRect().height : 0) +
            (chips ? chips.getBoundingClientRect().height : 0) + 20;
    send({ type: 'streamlit:setFrameHeight', height: Math.ceil(h) });
  }

  function submitQuery(val) {
    if (!val) return;
    document.getElementById('vm-input').value = '';
    send({ type: 'streamlit:setComponentValue', value: val, dataType: 'json' });
  }

  document.getElementById('vm-form').addEventListener('submit', function(e) {
    e.preventDefault();
    submitQuery(document.getElementById('vm-input').value.trim());
  });

  document.querySelectorAll('.chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
      document.getElementById('vm-input').value = this.dataset.query;
      submitQuery(this.dataset.query);
    });
  });

  document.getElementById('vm-file').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var btn = document.getElementById('vm-img-btn');
    var reader = new FileReader();
    reader.onload = function(ev) {
      document.getElementById('vm-input').value = '';
      btn.classList.add('has-image');
      send({ type: 'streamlit:setComponentValue', value: { type: 'image', data: ev.target.result }, dataType: 'json' });
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  });

  window.addEventListener('load', setHeight);
  document.fonts.ready.then(setHeight);

  window.addEventListener('message', function(e) {
    if (e.data.isStreamlitMessage && e.data.type === 'streamlit:render') {
      setHeight();
    }
  });

  document.addEventListener('mousemove', function(e) {
    try {
      var rect = window.frameElement.getBoundingClientRect();
      window.parent.dispatchEvent(new MouseEvent('mousemove', {
        bubbles: true,
        clientX: e.clientX + rect.left,
        clientY: e.clientY + rect.top
      }));
    } catch(err) {}
  });

  document.addEventListener('mouseleave', function() {
    try {
      window.parent.dispatchEvent(new MouseEvent('mouseleave', { bubbles: true }));
    } catch(err) {}
  });
</script>
</body>
</html>
