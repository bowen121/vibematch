# ── Training hyperparameters ──
clip:
  batch_size: 256
  learning_rate: 1.0e-4
  epochs: 100
  projection_dim: 256
  temperature: 0.07
  learnable_temp: true
  weight_decay: 1.0e-3
  dropout: 0.2
  scheduler: cosine
  warmup_epochs: 5

classifier:
  batch_size: 128
  learning_rate: 1.0e-3
  epochs: 50
  hidden_dims: [512, 256]
  dropout: 0.3
  patience: 5           # early stopping patience
